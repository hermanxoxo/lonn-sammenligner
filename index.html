<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lønnsammenligner</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .leader-card {
      background: var(--dark);
      color: #fff;
      border-radius: var(--radius);
      padding: 32px 36px;
      text-align: center;
      margin-bottom: 20px;
      box-shadow: 0 2px 16px rgba(26,26,46,0.18);
    }

    .leader-eyebrow {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8892b0;
      margin-bottom: 8px;
    }

    .leader-name {
      font-size: 2.6rem;
      font-weight: 800;
      line-height: 1.1;
    }

    .leader-comment {
      margin-top: 12px;
      color: #c0c8de;
      font-size: 0.95rem;
    }

    .cmp-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 24px;
    }

    .cmp-block {
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .cmp-block .lbl { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.7px; color: #8892b0; margin-bottom: 4px; }
    .cmp-block .val { font-size: 1rem; font-weight: 700; }

    .person-link {
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      border-radius: var(--radius);
      transition: box-shadow 0.18s, transform 0.18s;
    }
    .person-link:hover {
      box-shadow: 0 6px 22px rgba(0,0,0,0.13);
      transform: translateY(-2px);
    }

    .person-thumb {
      width: 105px;
      flex-shrink: 0;
    }
    .person-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    .person-info { padding: 18px 20px; flex: 1; }
    .person-info h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 10px; }

    .person-salary { font-size: 1.1rem; font-weight: 700; }
    .person-sub { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }
    .person-meta { font-size: 0.76rem; color: var(--muted); margin-top: 10px; }

    .person-empty { color: #b0b4c8; font-style: italic; font-size: 0.88rem; }

    .person-arrow {
      display: flex;
      align-items: center;
      padding-right: 16px;
      color: var(--muted);
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">Lønnsammenligner</a>
  <div class="nav-links">
    <a href="herman.html" class="nav-link">Herman</a>
    <a href="ditlev.html" class="nav-link">Ditlev</a>
  </div>
</nav>

<main>
  <!-- Leader section -->
  <div class="leader-card">
    <div class="leader-eyebrow">Leder akkurat nå</div>
    <div class="leader-name" id="leader-name">–</div>
    <div class="leader-comment" id="leader-comment">Gå til profilsidene for å legge inn lønn</div>
    <div class="cmp-stats" id="cmp-stats" style="display:none"></div>
  </div>

  <!-- Person cards -->
  <div class="grid-2">
    <a href="herman.html" class="card person-link">
      <div class="person-thumb"><img src="Herman.png" alt="Herman"></div>
      <div class="person-info">
        <h3>Herman</h3>
        <div id="mini-herman"></div>
      </div>
      <div class="person-arrow">›</div>
    </a>
    <a href="ditlev.html" class="card person-link">
      <div class="person-thumb"><img src="Ditlev.webp" alt="Ditlev"></div>
      <div class="person-info">
        <h3>Ditlev</h3>
        <div id="mini-ditlev"></div>
      </div>
      <div class="person-arrow">›</div>
    </a>
  </div>
</main>

<script>
  function loadData() {
    const raw = localStorage.getItem('lonn-sammenligner');
    const def = { herman: { salaryEntries: [], portfolio: [] }, ditlev: { salaryEntries: [], portfolio: [] } };
    if (!raw) return def;
    const d = JSON.parse(raw);
    // Migrate old format (plain arrays)
    if (Array.isArray(d.herman)) {
      return {
        herman: { salaryEntries: d.herman, portfolio: [] },
        ditlev: { salaryEntries: Array.isArray(d.ditlev) ? d.ditlev : [], portfolio: [] }
      };
    }
    ['herman', 'ditlev'].forEach(p => {
      d[p] = d[p] || {};
      d[p].salaryEntries = d[p].salaryEntries || [];
      d[p].portfolio = d[p].portfolio || [];
    });
    return d;
  }

  function latestYearly(entries) {
    return entries.length ? entries[entries.length - 1].yearly : null;
  }

  function fmtKr(v) {
    if (v == null) return '–';
    return Math.round(v).toLocaleString('nb-NO') + ' kr';
  }

  function getComment(leader, pct) {
    const other = leader === 'Herman' ? 'Ditlev' : 'Herman';
    if (pct < 1)  return `Ekstremt jevnt! ${leader} leder med hårfin margin 🤝`;
    if (pct < 5)  return `Knall jevnt — ${leader} er hakket foran ${other} 🏃`;
    if (pct < 15) return `${leader} leder komfortabelt 😎`;
    if (pct < 30) return `${leader} drar ifra — ${other} må ta noen ekstra vakter! 💼`;
    return `${leader} topper lønnsligaen med solid margin! 👑`;
  }

  function renderMini(person, entries, portfolio) {
    const yearly = latestYearly(entries);
    const el = document.getElementById('mini-' + person);
    if (!yearly) {
      el.innerHTML = '<div class="person-empty">Ingen lønn registrert</div>';
      return;
    }
    el.innerHTML = `
      <div class="person-salary">${fmtKr(yearly)}</div>
      <div class="person-sub">per år</div>
      <div class="person-meta">${entries.length} registrering${entries.length !== 1 ? 'er' : ''} · ${portfolio.length} aksjer/fond</div>
    `;
  }

  function render() {
    const data = loadData();
    const h = latestYearly(data.herman.salaryEntries);
    const d = latestYearly(data.ditlev.salaryEntries);

    renderMini('herman', data.herman.salaryEntries, data.herman.portfolio);
    renderMini('ditlev', data.ditlev.salaryEntries, data.ditlev.portfolio);

    if (h !== null && d !== null) {
      const diff = Math.abs(h - d);
      const pct = diff / Math.min(h, d) * 100;
      const leader = h >= d ? 'Herman' : 'Ditlev';

      document.getElementById('leader-name').textContent = leader + ' 👑';
      document.getElementById('leader-comment').textContent = getComment(leader, pct);

      const cmpEl = document.getElementById('cmp-stats');
      cmpEl.style.display = 'grid';
      cmpEl.innerHTML = `
        <div class="cmp-block"><div class="lbl">Herman / år</div><div class="val">${fmtKr(h)}</div></div>
        <div class="cmp-block"><div class="lbl">Ditlev / år</div><div class="val">${fmtKr(d)}</div></div>
        <div class="cmp-block"><div class="lbl">Differanse</div><div class="val">${fmtKr(diff)}</div></div>
      `;
    } else if (h !== null || d !== null) {
      const name = h !== null ? 'Herman' : 'Ditlev';
      document.getElementById('leader-name').textContent = name + ' leder foreløpig';
      document.getElementById('leader-comment').textContent = 'Venter på lønn for den andre...';
    }
  }

  render();
</script>

</body>
</html>
